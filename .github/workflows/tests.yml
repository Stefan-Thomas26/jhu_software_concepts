name: Pytest Suite

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER:     testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB:       testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
      DB_HOST:      localhost
      DB_PORT:      5432
      DB_NAME:      testdb
      DB_USER:      testuser
      DB_PASSWORD:  testpass
      DATA_DIR:     src/data

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: module_6
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Postgres to be ready
        run: |
          until pg_isready -h localhost -p 5432 -U testuser; do
            echo "Waiting for postgres..."; sleep 1
          done

      - name: Run full Pytest suite with coverage
        working-directory: module_6
        run: |
          pytest tests/ --cov=src/web/webapp --cov=src/db \
                 --cov=src/shared --cov=src/web/publisher.py \
                 --cov=src/worker/consumer.py \
                 --cov-report=term-missing \
                 --cov-fail-under=100 | tee coverage_summary.txt

      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: module_6/coverage_summary.txt